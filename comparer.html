<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JCI JSON Comparer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0d1117; color: #e6edf3; padding: 16px; min-height: 100vh; }

/* ---- Header ---- */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
.header h1 { font-size: 18px; font-weight: 600; color: #f0f6fc; }

/* ---- Stats ---- */
.stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat { padding: 4px 12px; border-radius: 6px; font-size: 12px; font-weight: 500; }
.stat-total { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
.stat-changed { background: #3d2e00; color: #e3b341; border: 1px solid #5a4300; }
.stat-added { background: #0b3b24; color: #3fb950; border: 1px solid #196c2e; }
.stat-removed { background: #3d0e14; color: #f85149; border: 1px solid #6b1a1a; }
.stat-same { background: #161b22; color: #8b949e; border: 1px solid #21262d; }
.jmespath-active { background: #0b3b24; color: #3fb950; font-family: 'Cascadia Code','JetBrains Mono','Consolas',monospace; font-size: 12px; white-space: normal; word-break: break-all; max-width: 500px; }

/* ---- File Bar ---- */
.file-bar { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; background: #161b22; padding: 12px 16px; border-radius: 8px; border: 1px solid #30363d; }
.file-group { display: flex; align-items: center; gap: 8px; }
.file-group label { font-size: 12px; color: #8b949e; font-weight: 600; white-space: nowrap; }
.file-group input[type="file"] { font-size: 12px; color: #c9d1d9; }
.file-group input[type="file"]::file-selector-button { padding: 4px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; font-size: 12px; cursor: pointer; }
.file-group input[type="file"]::file-selector-button:hover { background: #30363d; }
.file-name { color: #58a6ff; font-size: 13px; font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; }
.file-name.not-loaded { color: #484f58; font-style: italic; }


/* ---- Toolbar ---- */
.toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; background: #161b22; padding: 10px 14px; border-radius: 8px; border: 1px solid #30363d; }
.toolbar-group { display: flex; align-items: center; gap: 6px; }
.toolbar label { font-size: 12px; color: #8b949e; font-weight: 500; white-space: nowrap; }
.toolbar input[type="text"] { padding: 5px 10px; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 13px; font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; outline: none; width: 280px; }
.toolbar input[type="text"]:focus { border-color: #58a6ff; }
.toolbar input[type="text"]::placeholder { color: #484f58; font-family: 'Segoe UI', system-ui, sans-serif; }
.toolbar button, .tb-btn { padding: 5px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.toolbar button:hover, .tb-btn:hover { background: #30363d; }
.toolbar button:active, .tb-btn:active { background: #484f58; }
.toolbar-sep { width: 1px; height: 28px; background: #30363d; margin: 0 4px; }

/* ---- Split View ---- */
.split-view { display: flex; gap: 2px; }
.panel { flex: 1; min-width: 0; overflow-y: auto; max-height: calc(100vh - 200px); padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; }
.panel-left { border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0; }
.panel-right { border-top-left-radius: 0; border-bottom-left-radius: 0; }
.panel h2 { font-size: 13px; font-weight: 600; color: #8b949e; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid #21262d; text-transform: uppercase; letter-spacing: 0.5px; }

/* ---- Tree View ---- */
.tree-node { }
.node-row { display: flex; align-items: center; gap: 4px; padding: 2px 6px; border-radius: 4px; cursor: default; white-space: nowrap; }
.node-row.branch { cursor: pointer; }
.node-row.branch:hover { background: #161b22; }
.node-row.has-diff { border-left: 3px solid #e3b341; }
.node-row.has-added { border-left: 3px solid #3fb950; }
.node-row.has-removed { border-left: 3px solid #f85149; }
.toggle-icon { width: 14px; height: 14px; display: inline-flex; align-items: center; justify-content: center; font-size: 8px; color: #484f58; flex-shrink: 0; user-select: none; }
.node-key { color: #79c0ff; }
.node-colon { color: #484f58; margin-right: 4px; }
.node-eq { color: #484f58; }
.node-info { font-size: 10px; color: #484f58; margin-left: 4px; }
.value-same { color: #a5d6ff; }
.value-changed-left { color: #f85149; text-decoration: line-through; background: #3d0e14; padding: 0 4px; border-radius: 3px; }
.value-changed-right { color: #3fb950; background: #0b3b24; padding: 0 4px; border-radius: 3px; }
.value-added { color: #3fb950; background: #0b3b24; padding: 0 4px; border-radius: 3px; }
.value-removed { color: #f85149; text-decoration: line-through; background: #3d0e14; padding: 0 4px; border-radius: 3px; }
.value-null { color: #8b949e; font-style: italic; }
.value-bool { color: #ff7b72; }
.value-string { color: #a5d6ff; }
.value-number { color: #79c0ff; }
.children { margin-left: 18px; border-left: 1px solid #21262d; padding-left: 6px; }
.hidden { display: none; }

/* ---- Table View ---- */
.table-view { width: 100%; overflow-x: auto; margin-top: 12px; }
.table-view table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-view th { background: #161b22; color: #8b949e; font-weight: 500; text-align: left; padding: 8px 12px; border-bottom: 2px solid #30363d; text-transform: uppercase; letter-spacing: 0.3px; font-size: 11px; }
.table-view td { padding: 6px 12px; border-bottom: 1px solid #21262d; vertical-align: middle; }
.table-view tr:hover td { background: #161b22; }
.col-path { color: #f0f6fc; font-weight: 500; white-space: nowrap; font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; }
.col-value { font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; font-size: 12px; max-width: 400px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.col-status { text-align: center; }
.status-badge { display: inline-block; padding: 1px 8px; border-radius: 8px; font-size: 10px; font-weight: 500; letter-spacing: 0.3px; }
.status-badge.same { background: #161b22; color: #8b949e; border: 1px solid #21262d; }
.status-badge.changed { background: #3d2e00; color: #e3b341; border: 1px solid #5a4300; }
.status-badge.added { background: #0b3b24; color: #3fb950; border: 1px solid #196c2e; }
.status-badge.removed { background: #3d0e14; color: #f85149; border: 1px solid #6b1a1a; }

/* ---- Map Header ---- */
.map-header { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 8px 14px; margin-bottom: 12px; }
.map-header-label { color: #79c0ff; font-family: 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace; font-size: 13px; }
.map-summary { padding: 6px 14px; color: #8b949e; font-size: 12px; border-bottom: 1px solid #21262d; margin-bottom: 8px; }
.result-preview { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; margin: 8px 0; padding: 8px 14px; font-family: 'Cascadia Code','JetBrains Mono','Consolas',monospace; font-size: 12px; line-height: 1.7; }
.result-preview-row { word-break: break-all; }
.preview-side-label { color: #58a6ff; font-weight: 500; margin-right: 6px; }
.preview-count { color: #484f58; font-size: 11px; }
.preview-more { color: #484f58; }
.preview-truncated { color: #484f58; }

/* Help button & modal */
.help-btn { cursor: pointer; color: #58a6ff; font-size: 14px; margin-left: 3px; vertical-align: middle; }
.help-btn:hover { color: #79c0ff; }
.help-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: flex-start; padding: 40px 16px; overflow-y: auto; }
.help-overlay.open { display: flex; }
.help-modal { background: #161b22; border: 1px solid #30363d; border-radius: 12px; max-width: 720px; width: 100%; margin: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.help-modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid #30363d; font-size: 16px; font-weight: 600; }
.help-modal-close { font-size: 24px; cursor: pointer; color: #8b949e; line-height: 1; }
.help-modal-close:hover { color: #f85149; }
.help-modal-body { padding: 20px; font-size: 14px; line-height: 1.6; color: #c9d1d9; }
.help-modal-body h4 { color: #e6edf3; margin: 18px 0 8px; font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px; }
.help-modal-body h4:first-child { margin-top: 0; }
.help-modal-body p { margin: 6px 0 12px; }
.help-example { background: #0d1117; border: 1px solid #21262d; border-radius: 6px; padding: 8px 12px; margin: 6px 0; font-size: 13px; }
.help-example code { display: block; color: #79c0ff; font-family: 'Cascadia Code','JetBrains Mono','Consolas',monospace; font-size: 12px; margin-bottom: 2px; user-select: all; }
.help-example span { color: #8b949e; font-size: 12px; }
.help-tip { color: #484f58; font-size: 12px; font-style: italic; }
.help-notes { margin: 8px 0 0 18px; color: #8b949e; font-size: 13px; }
.help-notes li { margin: 4px 0; }
.help-notes code { color: #79c0ff; font-family: 'Cascadia Code','JetBrains Mono','Consolas',monospace; font-size: 12px; }
kbd { background: #21262d; border: 1px solid #30363d; border-radius: 3px; padding: 1px 5px; font-size: 11px; font-family: inherit; color: #c9d1d9; }

/* ---- Empty State ---- */
.empty-state { color: #484f58; text-align: center; padding: 40px 20px; font-size: 14px; }

/* ---- Responsive ---- */
@media (max-width: 800px) {
  .split-view { flex-direction: column; }
  .panel { max-height: none; }
  .panel-left { border-right: 1px solid #30363d; border-radius: 6px; }
  .panel-right { border-radius: 6px; }
  .toolbar input[type="text"] { width: 160px; }
}
</style>

<body>

<div class="header">
  <h1>JCI JSON Comparer</h1>
  <div class="stats" id="statsBar"></div>
</div>

<!-- File picker -->
<div class="file-bar" id="fileBar">
  <div class="file-group">
    <label>Left (original):</label>
    <input type="file" id="fileLeft" accept=".json">
    <span id="fileLeftName" class="file-name not-loaded">Select file...</span>
  </div>
  <div class="file-group">
    <label>Right (modified):</label>
    <input type="file" id="fileRight" accept=".json">
    <span id="fileRightName" class="file-name not-loaded">Select file...</span>
  </div>
  <span style="color:#484f58;font-size:12px;">Defaults: SBS_DefaultT1_reorganized.json &amp; SBS_CabResizedT1_reorganized.json</span>
</div>

<!-- Toolbar (hidden until data loaded) -->
<div class="toolbar" id="toolbar" style="display:none;">
  <div class="toolbar-group">
    <label>Search: <span class="help-btn" onclick="openHelp('filter')" title="How to use Search">&#9432;</span></label>
    <input type="text" id="filterInput" placeholder='e.g. weight, IP, segmentType' spellcheck="false">
    <button id="filterBtn">Apply</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label>JMESPath: <span class="help-btn" onclick="openHelp('jmespath')" title="How to use JMESPath">&#9432;</span></label>
    <input type="text" id="mapInput" placeholder='e.g. unit.segmentList[*].segmentType' spellcheck="false">
    <button id="mapBtn">Query</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button id="expandAllBtn" class="tb-btn" title="Expand all nodes">&#9660; All</button>
    <button id="collapseAllBtn" class="tb-btn" title="Collapse all nodes">&#9650; All</button>
  </div>
</div>

<div class="split-view" id="splitView" style="display:none;">
  <div class="panel panel-left">
    <h2 id="panelLeftTitle">Left</h2>
    <div id="viewLeft"></div>
  </div>
  <div class="panel panel-right">
    <h2 id="panelRightTitle">Right</h2>
    <div id="viewRight"></div>
  </div>
</div>

<div id="tableView" class="table-view" style="display:none;">
</div>

<script>
// =====================================================================
//  DATA (loaded dynamically)
// =====================================================================
let DATA_LEFT = null;
let DATA_RIGHT = null;
let FILE_LEFT = '';
let FILE_RIGHT = '';

// =====================================================================
//  FILE LOADING
// =====================================================================

function readFileInput(inputId, nameSpanId) {
  return new Promise(function(resolve) {
    const input = document.getElementById(inputId);
    const file = input.files[0];
    if (!file) { resolve(null); return; }
    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const data = JSON.parse(e.target.result);
        document.getElementById(nameSpanId).textContent = file.name;
        document.getElementById(nameSpanId).classList.remove('not-loaded');
        resolve(data);
      } catch (err) {
        resolve(null);
      }
    };
    reader.readAsText(file);
  });
}

function tryFetch(url) {
  return fetch(url).then(function(r) {
    if (!r.ok) throw new Error('HTTP ' + r.status);
    return r.json();
  });
}

function checkBothLoaded() {
  if (DATA_LEFT && DATA_RIGHT) {
    onDataLoaded();
  }
}

function onDataLoaded() {
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('splitView').style.display = 'flex';
  document.getElementById('panelLeftTitle').textContent = FILE_LEFT;
  document.getElementById('panelRightTitle').textContent = FILE_RIGHT;
  refreshView();
}

// =====================================================================
//  UTILITY FUNCTIONS
// =====================================================================

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function formatValue(v) {
  if (v === null || v === undefined) return '<span class="value-null">null</span>';
  if (typeof v === 'boolean') return '<span class="value-bool">' + v + '</span>';
  if (typeof v === 'string') return '<span class="value-string">"' + esc(v) + '"</span>';
  if (typeof v === 'number') return '<span class="value-number">' + v + '</span>';
  return '<span class="value-same">' + esc(JSON.stringify(v)) + '</span>';
}

// =====================================================================
//  DIFF FUNCTIONS
// =====================================================================

function getValueStatus(leftVal, rightVal) {
  if (leftVal === undefined || leftVal === null) {
    if (rightVal === undefined || rightVal === null) return 'same';
    return 'added';
  }
  if (rightVal === undefined || rightVal === null) return 'removed';
  if (typeof leftVal !== typeof rightVal) return 'changed';
  if (typeof leftVal !== 'object') {
    return leftVal !== rightVal ? 'changed' : 'same';
  }
  if (leftVal === rightVal) return 'same';
  try {
    return JSON.stringify(leftVal) === JSON.stringify(rightVal) ? 'same' : 'changed';
  } catch (e) {
    return 'changed';
  }
}

function computeStats(left, right) {
  let changed = 0, added = 0, removed = 0, same = 0;

  function walk(l, r) {
    if (l === undefined && r === undefined) return;
    if (l === undefined || r === undefined) {
      if (l === undefined && r !== undefined) added++;
      else if (r === undefined && l !== undefined) removed++;
      return;
    }
    if (typeof l !== 'object' || l === null || typeof r !== 'object' || r === null) {
      if (JSON.stringify(l) === JSON.stringify(r)) same++;
      else changed++;
      return;
    }
    if (Array.isArray(l) && Array.isArray(r)) {
      const maxLen = Math.max(l.length, r.length);
      for (let i = 0; i < maxLen; i++) walk(l[i], r[i]);
    } else if (!Array.isArray(l) && !Array.isArray(r)) {
      const allKeys = new Set([...Object.keys(l), ...Object.keys(r)]);
      for (const key of allKeys) walk(l[key], r[key]);
    } else {
      changed++;
    }
  }

  walk(left, right);
  return { changed: changed, added: added, removed: removed, same: same };
}

// =====================================================================
//  FULL TREE VIEW
// =====================================================================

function subtreeMatches(val, filterLower) {
  if (val === null || val === undefined) return false;
  const str = JSON.stringify(val).toLowerCase();
  if (str.includes(filterLower)) return true;
  if (typeof val === 'object') {
    for (const k in val) {
      if (k.toLowerCase().includes(filterLower)) return true;
      if (subtreeMatches(val[k], filterLower)) return true;
    }
  }
  return false;
}

function syncOtherPanel(side, path, expanded) {
  var otherId = side === 'left' ? 'viewRight' : 'viewLeft';
  var otherChildren = document.querySelector('#' + otherId + ' [data-path="' + path.replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]');
  if (!otherChildren) return;
  var otherToggle = otherChildren.parentElement.querySelector('.toggle-icon');
  if (!otherToggle) return;
  if (expanded) {
    otherChildren.classList.remove('hidden');
    otherToggle.textContent = '\u25BC';
  } else {
    otherChildren.classList.add('hidden');
    otherToggle.textContent = '\u25B6';
  }
}

function renderValueNode(key, val, otherVal, side, depth, filterText, path) {

  if (filterText && filterText.trim()) {
    const ft = filterText.trim().toLowerCase();
    const keyMatch = key && key.toLowerCase().includes(ft);
    const checkV = (val != null) ? val : otherVal;
    const valMatch = checkV != null && JSON.stringify(checkV).toLowerCase().includes(ft);
    if (!keyMatch && !valMatch) {
      if (typeof val === 'object' && val !== null) {
        if (!subtreeMatches(val, ft)) return null;
      } else if (typeof otherVal === 'object' && otherVal !== null) {
        if (!subtreeMatches(otherVal, ft)) return null;
      } else {
        return null;
      }
    }
  }

  if (val === undefined || val === null) {
    if (otherVal !== undefined && otherVal !== null) {
      const div = document.createElement('div');
      div.className = 'tree-node';
      const row = document.createElement('div');
      row.className = 'node-row';
      row.style.paddingLeft = (depth * 18 + 6) + 'px';
      row.innerHTML = '<span class="node-key">' + esc(key) + '</span><span class="node-colon">:</span> '
        + (side === 'left'
          ? '<span class="value-added">(added)</span>'
          : '<span class="value-removed">(removed)</span>');
      div.appendChild(row);
      return div;
    }
    return null;
  }

  const isBranch = typeof val === 'object' && val !== null;
  const status = getValueStatus(val, otherVal);
  const hasChildren = isBranch && (Array.isArray(val) ? val.length > 0 : Object.keys(val).length > 0);

  const div = document.createElement('div');
  div.className = 'tree-node';

  if (isBranch && hasChildren) {
    const row = document.createElement('div');
    row.className = 'node-row branch';
    row.style.paddingLeft = (depth * 18 + 6) + 'px';

    if (status !== 'same') {
      row.classList.add('has-diff');
    }

    const toggle = document.createElement('span');
    toggle.className = 'toggle-icon';
    toggle.textContent = '\u25B6';

    const keySpan = document.createElement('span');
    keySpan.className = 'node-key';
    keySpan.textContent = key || '';

    const info = document.createElement('span');
    info.className = 'node-info';
    if (Array.isArray(val)) {
      info.textContent = '[' + val.length + ']';
    } else {
      info.textContent = '{' + Object.keys(val).length + '}';
    }

    row.appendChild(toggle);
    row.appendChild(keySpan);
    row.appendChild(info);

    div.appendChild(row);

    const childrenDiv = document.createElement('div');
    childrenDiv.className = 'children hidden';
    childrenDiv.setAttribute('data-path', path);

    if (Array.isArray(val)) {
      const otherArr = Array.isArray(otherVal) ? otherVal : [];
      for (let i = 0; i < val.length; i++) {
        const childPath = path + '/[' + i + ']';
        const child = renderValueNode('[' + i + ']', val[i], otherArr[i], side, depth + 1, filterText, childPath);
        if (child) childrenDiv.appendChild(child);
      }
    } else {
      const allKeys = Object.keys(val);
      for (let k = 0; k < allKeys.length; k++) {
        const keyName = allKeys[k];
        const childPath = path + '/' + keyName;
        const child = renderValueNode(keyName, val[keyName],
          (otherVal && typeof otherVal === 'object' && !Array.isArray(otherVal)) ? otherVal[keyName] : undefined,
          side, depth + 1, filterText, childPath);
        if (child) childrenDiv.appendChild(child);
      }

      if (otherVal && typeof otherVal === 'object' && !Array.isArray(otherVal)) {
        for (const keyName in otherVal) {
          if (val[keyName] !== undefined) continue;
          const childPath = path + '/' + keyName;
          const child = renderValueNode(keyName, undefined, otherVal[keyName], side, depth + 1, filterText, childPath);
          if (child) childrenDiv.appendChild(child);
        }
      }
    }

    div.appendChild(childrenDiv);

    function toggleBranch() {
      const isHidden = childrenDiv.classList.contains('hidden');
      if (isHidden) {
        childrenDiv.classList.remove('hidden');
        toggle.textContent = '\u25BC';
      } else {
        childrenDiv.classList.add('hidden');
        toggle.textContent = '\u25B6';
      }
      syncOtherPanel(side, path, !childrenDiv.classList.contains('hidden'));
    }

    row.onclick = function(e) {
      if (e.target.closest('.toggle-icon')) return;
      toggleBranch();
    };

    toggle.onclick = function(e) {
      e.stopPropagation();
      toggleBranch();
    };

  } else {
    const row = document.createElement('div');
    row.className = 'node-row';
    row.style.paddingLeft = (depth * 18 + 6) + 'px';

    let keyHtml = '';
    if (key != null && key !== '') {
      keyHtml = '<span class="node-key">' + esc(key) + '</span><span class="node-colon">:</span> ';
    }

    let valHtml = '';
    if (status === 'changed') {
      if (side === 'left') {
        valHtml = '<span class="value-changed-left">' + esc(JSON.stringify(val)) + '</span>';
      } else {
        valHtml = '<span class="value-changed-right">' + esc(JSON.stringify(val)) + '</span>';
      }
    } else if (status === 'added') {
      valHtml = '<span class="value-added">' + esc(JSON.stringify(val)) + '</span>';
    } else if (status === 'removed') {
      valHtml = '<span class="value-removed">' + esc(JSON.stringify(val)) + '</span>';
    } else {
      valHtml = formatValue(val);
    }

    row.innerHTML = keyHtml + valHtml;
    div.appendChild(row);
  }

  return div;
}

function renderFullTree(container, leftData, rightData, side, filterText, rootLabel) {
  container.innerHTML = '';
  const data = side === 'left' ? leftData : rightData;
  const otherData = side === 'left' ? rightData : leftData;
  const label = rootLabel || '(root)';
  const rootNode = renderValueNode(label, data, otherData, side, 0, filterText, '');
  if (rootNode) container.appendChild(rootNode);
}

// =====================================================================
//  JMESPATH — RENDER RESULTS DIRECTLY IN THE TREE
// =====================================================================

function renderJmesPathResult(expression, filterText) {
  let leftResult, rightResult;
  try {
    leftResult = jmespath.search(DATA_LEFT, expression);
    rightResult = jmespath.search(DATA_RIGHT, expression);
  } catch (e) {
    document.getElementById('viewLeft').innerHTML = '<div class="empty-state" style="margin-top:20px;">\u26A0 Error: ' + esc(e.message) + '</div>';
    document.getElementById('viewRight').innerHTML = '';
    return;
  }

  // Compute stats on the result data
  var stats = computeStats(leftResult, rightResult);
  var resultSummary = '';
  if (leftResult === null && rightResult === null) {
    resultSummary = 'Query returned \u2205 (no match)';
  } else if (Array.isArray(leftResult) && Array.isArray(rightResult)) {
    var len = Math.max(leftResult.length, rightResult.length);
    resultSummary = len + ' item(s), ' + (stats.changed + stats.added + stats.removed) + ' difference(s), ' + stats.same + ' match(es)';
  } else {
    resultSummary = (stats.changed + stats.added + stats.removed) > 0 ? 'Different' : 'Match';
  }

  // Show expression + summary in stats bar
  document.getElementById('statsBar').innerHTML =
    '<span class="stat jmespath-active">JMESPath\u2192 ' + esc(expression) + '</span>'
    + '<span class="stat stat-total">' + resultSummary + '</span>'
    + '<span class="stat stat-changed">Changed: ' + stats.changed + '</span>'
    + '<span class="stat stat-added">Added: ' + stats.added + '</span>'
    + '<span class="stat stat-removed">Removed: ' + stats.removed + '</span>'
    + '<span class="stat stat-same">Same: ' + stats.same + '</span>';

  renderFullTree(document.getElementById('viewLeft'), leftResult, rightResult, 'left', filterText, expression);
  renderFullTree(document.getElementById('viewRight'), leftResult, rightResult, 'right', filterText, expression);
}

// =====================================================================
//  RESULT DIMENSIONS HELPER
// =====================================================================

function describeResult(v) {
  if (v === null || v === undefined) return '\u2205';
  if (typeof v === 'string') return 'string(' + v.length + ')';
  if (typeof v === 'number') return 'number';
  if (typeof v === 'boolean') return 'boolean';
  if (Array.isArray(v)) return 'array[' + v.length + ']';
  return 'object{' + Object.keys(v).length + '}';
}

// =====================================================================
//  VIEW MANAGEMENT
// =====================================================================

var currentFilter = '';
var currentMap = '';

function refreshView() {
  if (!DATA_LEFT || !DATA_RIGHT) return;

  var filterExpr = document.getElementById('filterInput').value;
  var mapExpr = document.getElementById('mapInput').value;
  currentFilter = filterExpr;
  currentMap = mapExpr;

  document.getElementById('splitView').style.display = 'flex';

  if (mapExpr && mapExpr.trim()) {
    // JMESPath mode: show query result in the tree
    renderJmesPathResult(mapExpr, filterExpr);
  } else {
    // Full JSON tree mode
    var stats = computeStats(DATA_LEFT, DATA_RIGHT);
    document.getElementById('statsBar').innerHTML =
      '<span class="stat stat-total">Total differences: ' + (stats.changed + stats.added + stats.removed) + '</span>' +
      '<span class="stat stat-changed">Changed: ' + stats.changed + '</span>' +
      '<span class="stat stat-added">Added: ' + stats.added + '</span>' +
      '<span class="stat stat-removed">Removed: ' + stats.removed + '</span>' +
      '<span class="stat stat-same">Same: ' + stats.same + '</span>';

    renderFullTree(document.getElementById('viewLeft'), DATA_LEFT, DATA_RIGHT, 'left', filterExpr);
    renderFullTree(document.getElementById('viewRight'), DATA_LEFT, DATA_RIGHT, 'right', filterExpr);
  }
}

// =====================================================================
// =====================================================================

document.addEventListener('DOMContentLoaded', function() {
  // File inputs
  document.getElementById('fileLeft').addEventListener('change', function() {
    readFileInput('fileLeft', 'fileLeftName').then(function(data) {
      DATA_LEFT = data;
      checkBothLoaded();
    });
  });
  document.getElementById('fileRight').addEventListener('change', function() {
    readFileInput('fileRight', 'fileRightName').then(function(data) {
      DATA_RIGHT = data;
      checkBothLoaded();
    });
  });
  // Toolbar — filter
  document.getElementById('filterInput').addEventListener('input', function() {
    refreshView();
  });
  document.getElementById('filterInput').addEventListener('keydown', function(e) {
    if (e.key === 'Escape') { this.value = ''; refreshView(); }
  });
  // Toolbar — JMESPath (on Enter only, not live — query can be expensive)
  document.getElementById('mapInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') refreshView();
    if (e.key === 'Escape') { this.value = ''; refreshView(); }
  });
  document.getElementById('filterBtn').addEventListener('click', refreshView);
  document.getElementById('mapBtn').addEventListener('click', refreshView);

  // Scroll sync between left and right panels
  // Uses requestAnimationFrame + value check to avoid sync layout during toggles
  var scrollSyncPending = null;

  function doScrollSync() {
    if (!scrollSyncPending) return;
    var s = scrollSyncPending.source;
    var t = scrollSyncPending.target;
    scrollSyncPending = null;
    if (t.scrollTop !== s.scrollTop) t.scrollTop = s.scrollTop;
    if (t.scrollLeft !== s.scrollLeft) t.scrollLeft = s.scrollLeft;
  }

  function syncScroll(source, target) {
    return function() {
      if (!scrollSyncPending) requestAnimationFrame(doScrollSync);
      scrollSyncPending = { source: source, target: target };
    };
  }
  // The .panel divs have overflow-y: auto, that's where scrolling happens
  var panelLeft = document.querySelector('.panel-left');
  var panelRight = document.querySelector('.panel-right');
  panelLeft.addEventListener('scroll', syncScroll(panelLeft, panelRight), { passive: true });
  panelRight.addEventListener('scroll', syncScroll(panelRight, panelLeft), { passive: true });

  // Expand / Collapse all
  function expandAll() {
    document.querySelectorAll('#viewLeft .children, #viewRight .children').forEach(function(el) {
      el.classList.remove('hidden');
    });
    document.querySelectorAll('#viewLeft .toggle-icon, #viewRight .toggle-icon').forEach(function(el) {
      el.textContent = '\u25BC';
    });
  }
  function collapseAll() {
    document.querySelectorAll('#viewLeft .children, #viewRight .children').forEach(function(el) {
      el.classList.add('hidden');
    });
    document.querySelectorAll('#viewLeft .toggle-icon, #viewRight .toggle-icon').forEach(function(el) {
      el.textContent = '\u25B6';
    });
  }
  document.getElementById('expandAllBtn').addEventListener('click', expandAll);
  document.getElementById('collapseAllBtn').addEventListener('click', collapseAll);

  // Try URL params first
  const params = new URLSearchParams(window.location.search);
  if (params.has('left') && params.has('right')) {
    Promise.all([tryFetch(params.get('left')), tryFetch(params.get('right'))])
      .then(function(results) {
        DATA_LEFT = results[0];
        DATA_RIGHT = results[1];
        FILE_LEFT = params.get('left');
        FILE_RIGHT = params.get('right');
        document.getElementById('fileLeftName').textContent = FILE_LEFT;
        document.getElementById('fileLeftName').classList.remove('not-loaded');
        document.getElementById('fileRightName').textContent = FILE_RIGHT;
        document.getElementById('fileRightName').classList.remove('not-loaded');
        onDataLoaded();
      })
      .catch(function() {
        // URL params failed — user picks files manually
      });
  }
});
</script>

<!-- HELP MODAL -->
<div class="help-overlay" id="helpOverlay" onclick="closeHelp()">
  <div class="help-modal" onclick="event.stopPropagation()">
    <div class="help-modal-header">
      <span id="helpModalTitle">Help</span>
      <span class="help-modal-close" onclick="closeHelp()">&times;</span>
    </div>
    <div class="help-modal-body" id="helpModalBody">
    </div>
  </div>
</div>

<script>
function openHelp(topic) {
  var body = document.getElementById('helpModalBody');
  var title = document.getElementById('helpModalTitle');
  if (topic === 'filter') {
    title.textContent = 'Search — How to Filter the Tree';
    body.innerHTML = '<p>Type any text to <strong>hide nodes</strong> whose keys and values don\'t contain it. The tree shows only branches that have a match somewhere in their subtree.</p>'
      + '<h4>Examples</h4>'
      + '<div class="help-example"><code>weight</code><span>Show all nodes that mention "weight" (key or value)</span></div>'
      + '<div class="help-example"><code>IP</code><span>Show only IP-segment related nodes</span></div>'
      + '<div class="help-example"><code>segmentType</code><span>Show segment type fields</span></div>'
      + '<div class="help-example"><code>800</code><span>Show nodes with value 800</span></div>'
      + '<p class="help-tip">The filter updates as you type. Press <kbd>Escape</kbd> to clear.</p>';
  } else {
    title.textContent = 'JMESPath — Query, Filter & Map';
    body.innerHTML = '<p>JMESPath is a query language for JSON, similar to <strong>JavaScript\'s .map() + .filter()</strong>. Write an expression and it runs against both datasets, showing a preview and a diff table.</p>'
      + '<h4>Get a field from every segment (like .map())</h4>'
      + '<div class="help-example"><code>unit.segmentList[*].segmentType</code><span>All segment types as a flat array</span></div>'
      + '<div class="help-example"><code>unit.segmentList[*].weight</code><span>All weights as a flat array</span></div>'
      + '<h4>Reshape objects (like .map() returning objects)</h4>'
      + '<div class="help-example"><code>unit.segmentList[*].{id: id, type: segmentType, weight: weight}</code><span>New objects with only id, type, weight</span></div>'
      + '<div class="help-example"><code>unit.segmentList[*].{segId: segmentIP_ID, x: geometry.x, y: geometry.y}</code><span>Coordinates + ID from nested objects</span></div>'
      + '<div class="help-example"><code>unit.segmentList[*].[segmentType, weight]</code><span>Array of pairs like [["IP",858], ...]</span></div>'
      + '<h4>Filter items (like .filter())</h4>'
      + '<div class="help-example"><code>unit.segmentList[?weight &gt; `800`]</code><span>Segments with weight over 800</span></div>'
      + '<div class="help-example"><code>unit.segmentList[?segmentType == `IP`]</code><span>Only IP-type segments</span></div>'
      + '<h4>Filter + reshape together</h4>'
      + '<div class="help-example"><code>unit.segmentList[?weight &gt; `800`].{type: segmentType, weight: weight}</code><span>Filter then map in one expression</span></div>'
      + '<h4>Other useful examples</h4>'
      + '<div class="help-example"><code>unit.segmentList[*].segmentType | sort(@)</code><span>Sorted unique types</span></div>'
      + '<div class="help-example"><code>unit.id</code><span>Simple scalar field</span></div>'
      + '<div class="help-example"><code>unit.segmentList[0]</code><span>First segment (full object)</span></div>'
      + '<h4>Syntax notes</h4>'
      + '<ul class="help-notes">'
      + '<li><code>[*]</code> means "iterate over all items in the array"</li>'
      + '<li><code>[?condition]</code> means "filter items where condition is true"</li>'
      + '<li>Use <strong>backticks</strong> for literal values: <code>`800`</code>, <code>`IP`</code>, <code>`true`</code></li>'
      + '<li>The query always starts from the <strong>root</strong> of the JSON, so paths begin with <code>unit.</code></li>'
      + '<li>Press <kbd>Enter</kbd> or click <strong>Query</strong> to execute</li>'
      + '</ul>';
  }
  document.getElementById('helpOverlay').classList.add('open');
}
function closeHelp() {
  document.getElementById('helpOverlay').classList.remove('open');
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeHelp();
});
</script>
</body>
