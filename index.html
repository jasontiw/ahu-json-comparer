<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AHU JSON Comparer</title>
<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="header">
  <h1>AHU JSON Comparer</h1>
  <div class="stats" id="statsBar"></div>
</div>

<!-- Drop zones + paste -->
<div class="file-bar" id="fileBar" style="flex-direction:column;align-items:stretch;gap:8px;">
  <div style="display:flex;gap:12px;flex-wrap:wrap;">
    <div class="drop-zone" id="dropLeft" data-side="left">
      <div class="drop-zone-icon">&#128196;</div>
      <div class="drop-zone-text">Drop <strong>.json</strong> here or click to select<br><span style="font-size:11px;color:#484f58;">Left (original)</span></div>
      <div class="drop-zone-filename" id="dropLeftName"></div>
      <input type="file" accept=".json">
    </div>
    <div class="drop-zone" id="dropRight" data-side="right">
      <div class="drop-zone-icon">&#128196;</div>
      <div class="drop-zone-text">Drop <strong>.json</strong> here or click to select<br><span style="font-size:11px;color:#484f58;">Right (modified)</span></div>
      <div class="drop-zone-filename" id="dropRightName"></div>
      <input type="file" accept=".json">
    </div>
  </div>
  <div class="paste-wrap">
    <button class="paste-btn" data-side="left">&#128203; Paste Left</button>
    <button class="paste-btn" data-side="right">&#128203; Paste Right</button>
  </div>
  <textarea id="pasteLeft" class="paste-area" placeholder='Paste left JSON here...'></textarea>
  <button id="pasteLoadLeft" class="paste-load-btn" style="display:none;">Load Left</button>
  <textarea id="pasteRight" class="paste-area" placeholder='Paste right JSON here...'></textarea>
  <button id="pasteLoadRight" class="paste-load-btn" style="display:none;">Load Right</button>
</div>

<!-- Toolbar (hidden until data loaded) -->
<div class="toolbar" id="toolbar" style="display:none;">
  <div class="toolbar-group">
    <label>Search: <span class="help-btn" onclick="openHelp('filter')" title="How to use Search">&#9432;</span></label>
    <input type="text" id="filterInput" placeholder='e.g. weight, IP, segmentType' spellcheck="false">
    <button id="filterBtn">Apply</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label>JMESPath: <span class="help-btn" onclick="openHelp('jmespath')" title="How to use JMESPath">&#9432;</span></label>
    <input type="text" id="mapInput" placeholder='e.g. unit.segmentList[*].segmentType' spellcheck="false">
    <button id="mapBtn">Query</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label>
      <input type="checkbox" id="reorganizeToggle" checked>
      Reorganize
    </label>
    <label class="sort-option">
      <input type="checkbox" id="sortByXToggle" checked>
      Sort by X
    </label>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <label>Skip fields: <span class="help-btn" onclick="openHelp('skip')" title="How to exclude fields">&#9432;</span></label>
    <input type="text" id="excludeInput" placeholder='e.g. id, $type, *_ID' spellcheck="false" class="exclude-input">
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button id="expandAllBtn" class="tb-btn" title="Expand all nodes">&#9660; All</button>
    <button id="collapseAllBtn" class="tb-btn" title="Collapse all nodes">&#9650; All</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group change-nav">
    <button id="prevChangeBtn" class="tb-btn" title="Previous change (P)">&#9650;</button>
    <span id="changeCounter" class="change-counter">0 / 0</span>
    <button id="nextChangeBtn" class="tb-btn" title="Next change (N)">&#9660;</button>
  </div>
</div>

<div class="split-view" id="splitView" style="display:none;">
  <div class="panel panel-left">
    <div class="breadcrumb" id="breadcrumbLeft"><span class="bc-root">root</span></div>
    <h2 id="panelLeftTitle">Left</h2>
    <div id="viewLeft"></div>
  </div>
  <div class="panel panel-right">
    <div class="breadcrumb" id="breadcrumbRight"><span class="bc-root">root</span></div>
    <h2 id="panelRightTitle">Right</h2>
    <div id="viewRight"></div>
  </div>
</div>

<div id="tableView" class="table-view" style="display:none;">
</div>



<!-- HELP MODAL -->
<div class="help-overlay" id="helpOverlay" onclick="closeHelp()">
  <div class="help-modal" onclick="event.stopPropagation()">
    <div class="help-modal-header">
      <span id="helpModalTitle">Help</span>
      <span class="help-modal-close" onclick="closeHelp()">&times;</span>
    </div>
    <div class="help-modal-body" id="helpModalBody">
    </div>
  </div>
</div>


  <script src="app.js"></script>
</body>
</html>
